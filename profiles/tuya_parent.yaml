name: tuya-parent
components:
  - id: main
    capabilities:
      - id: refresh
        version: 1
    categories:
      - name: Light
preferences:
  - name: deviceIp
    title: "Device IP Address"
    description: "Static local IP address of your fan (e.g. 192.168.1.50)"
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: "iptochange"
  - name: deviceId
    title: "Tuya Device ID"
    description: "Your Tuya Device ID"
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: "idtochange"
  - name: localKey
    title: "Tuya Local Key"
    description: "Your 16-character Local Key"
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: "localkeytochange"
